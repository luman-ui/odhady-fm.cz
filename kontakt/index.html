<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt | Bc. Šárka Radová Blažejová</title>
    <meta name="description" content="Odborné odhady tržní ceny nemovitostí na Severní Moravě. Kontaktujte mě pro nezávaznou nabídku.">
    
    <link rel="stylesheet" href="/style.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">

    <style>
        /* Specifické úpravy pro mobilní zobrazení přímo pro tuto stránku */
        @media (max-width: 768px) {
            .grid-kontakt {
                display: flex !important;
                flex-direction: column !important;
                gap: 20px !important;
            }
            .card {
                padding: 1.5rem !important;
            }
            .map-container {
                height: 300px !important; /* Na mobilu stačí menší mapa */
            }
            h1 {
                font-size: 1.8rem !important;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="container">
            <div class="logo">
                <a href="/"><strong>Bc. Šárka Radová Blažejová</strong></a>
            </div>
            <nav>
                <ul>
                    <li><a href="/">Úvod</a></li>
                    <li><a href="/omne/">O mně</a></li>
                    <li><a href="/cenik/">Ceník</a></li>
                    <li><a href="/kontakt/" style="color: var(--accent);">Kontakt</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="section-padding" style="background-color: var(--light-bg); text-align: center; padding: 10px 0;">
            <div class="container">
                 <h1 style="color: var(--primary);margin: 0;text-align: center;">Kontakt</h1>
            </div>
        </section>

        <section class="section-padding">
            <div class="container">
                <div class="grid grid-kontakt" style="align-items: start; gap: 35px;">
                    
                    <div class="card">
                        <h3 style="margin-top: 0;font-size: 1.2rem;">Bc. Šárka Radová Blažejová</h3>
                        <p style="color: var(--accent); font-weight: 600; margin-bottom: 5px;">Odhadce nemovitostí</p>
                        
                        <div style="margin-bottom: 10px;">
                            <small style="color: #777; text-transform: uppercase; letter-spacing: 1px;">Adresa</small>
                            <div style="font-weight: 600;">Palkovice 742, 739 41 Palkovice</div>
                        </div>

                        <div style="margin-bottom: 10px;">
                            <small style="color: #777; text-transform: uppercase; letter-spacing: 1px;">Telefon</small>
                            <div><a href="tel:+420777727563" style="text-decoration: none; color: var(--text); font-weight: 600; font-size: 1.1rem;">+420 777 727 563</a></div>
                        </div>

                        <div style="margin-bottom: 10px;">
                            <small style="color: #777; text-transform: uppercase; letter-spacing: 1px;">E-mail</small>
                            <div>
                                <a href="#" onclick="decodeEmail(this); return false;" style="text-decoration: none; color: var(--text); font-weight: 600;">
                                    [Zobrazit e-mail]
                                </a>
                            </div>
                        </div>
                        
                       
                        
                        <div>
                            <small style="color: #777; text-transform: uppercase; letter-spacing: 1px;">Lokalita působení</small>
                            <p style="margin: 5px 0 0 0; font-weight: 600;">Moravskoslezský kraj</p>
                            <p style="margin: 0; color: #555; font-size: 0.9rem;">(Frýdek-Místek, Ostrava a okolí)</p>
                            <p></p>
                        </div>
                    </div>
                    
                    <div class="card" style="padding: 0; overflow: hidden; border-color: #eee;">
                        <div class="map-container" style="width: 100%; height: 450px;">
                            <iframe 
                                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2581.34351322234!2d18.310636776880814!3d49.610123547432474!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x4713f96113856277%3A0x6b1944899554366d!2sPalkovice%20742%2C%20739%2041%20Palkovice!5e0!3m2!1scs!2scz!4v1700000000000" 
                                width="100%" 
                                height="100%" 
                                style="border:0;" 
                                allowfullscreen="" 
                                loading="lazy" 
                                referrerpolicy="no-referrer-when-downgrade">
                            </iframe>
                        </div>
                        
                    </div>

                </div>
            </div>
        </section>
    </main>

   

    <script src="/script.js"></script>
</body>
</html>
