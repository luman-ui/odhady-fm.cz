[[headers]]
  for = "/*"
  [headers.values]
    # Vynutí HTTPS na jeden rok (včetně subdomén)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    
    # Zabrání prohlížeči v "hádání" typu obsahu (ochrana proti MIME-sniffing)
    X-Content-Type-Options = "nosniff"
    
    # Zabrání zobrazení vašeho webu v iFramu na cizích stránkách (ochrana proti Clickjackingu)
    X-Frame-Options = "DENY"
    
    # Aktivuje ochranu proti Cross-Site Scriptingu (XSS) v prohlížeči
    X-XSS-Protection = "1; mode=block"
    
    # Základní politika pro zdroje (můžete upravit podle potřeby)
    Content-Security-Policy = "upgrade-insecure-requests;"
    
    # Omezuje informace o tom, odkud uživatel přichází
    Referrer-Policy = "strict-origin-when-cross-origin"